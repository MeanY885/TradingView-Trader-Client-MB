services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped

  app:
    image: tradingview-trader_app
    ports:
      - "2000:2000"
    environment:
      DATABASE_URL: postgresql://postgres:tvtrader_pg_2026@postgres:5432/tradingview_trader
      # IB Gateway is accessible within the Docker network on this URL.
      # The app uses this internally; no auth headers needed (session-based).
      IB_GATEWAY_URL: https://ib-gateway:5000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tradingview_trader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tvtrader_pg_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # IB Client Portal Gateway — Java-based reverse proxy for IB REST API.
  # Requires manual browser login at https://localhost:5000 once per day.
  # Download the gateway from https://www.interactivebrokers.com/en/trading/ib-api.php
  # and extract into ib-gateway/gateway/ before building.
  ib-gateway:
    build: ./ib-gateway
    ports:
      # Exposed to host for manual browser login (required for 2FA)
      - "5000:5000"
    volumes:
      - ./ib-gateway/conf.yaml:/opt/ibkr/root/conf.yaml:ro
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
