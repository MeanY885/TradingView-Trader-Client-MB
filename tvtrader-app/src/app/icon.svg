<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#0f0f0f"/>
  <!-- Candlestick 1 - bearish (red) -->
  <line x1="7" y1="5" x2="7" y2="9" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="4.5" y="9" width="5" height="8" rx="0.5" fill="#ef4444"/>
  <line x1="7" y1="17" x2="7" y2="21" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candlestick 2 - bullish (gold) -->
  <line x1="16" y1="8" x2="16" y2="12" stroke="#f5c518" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="13.5" y="12" width="5" height="10" rx="0.5" fill="#f5c518"/>
  <line x1="16" y1="22" x2="16" y2="26" stroke="#f5c518" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candlestick 3 - bullish (gold) -->
  <line x1="25" y1="4" x2="25" y2="7" stroke="#f5c518" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="22.5" y="7" width="5" height="12" rx="0.5" fill="#f5c518"/>
  <line x1="25" y1="19" x2="25" y2="23" stroke="#f5c518" stroke-width="1.5" stroke-linecap="round"/>
</svg>
